    /* ============================================
       ANDROID AUTOFILL FIX
       Прибираємо Android Chrome autofill overlay
       (іконки ключа / адреси / паролю)
       ============================================ */

    /* Вимикаємо жовтий/синій фон автофілу */

    input:-webkit-autofill:active,

    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,

      -webkit-text-fill-color: var(--text-main) !important;
      caret-color: var(--text-main) !important;
      transition: background-color 9999s ease !important;
    }

    /* Глобально вимикаємо credential / password / address autofill icons */

    input::-webkit-strong-password-auto-fill-button {
      visibility: hidden !important;
      display: none !important;
      pointer-events: none !important;
      width: 0 !important;
      height: 0 !important;
      position: absolute !important;
    }

    /* Для Firefox */
    input {
      -moz-appearance: none;
      appearance: none;
    }

    /* Ховаємо Chrome autofill dropdown icon (calendar, contacts, etc.) */

      display: none !important;
      opacity: 0 !important;
    }

    /* Додаткові Android Chrome autofill іконки */

    /* Ховаємо Android autofill overlay bar через відключення autofill highlight */

    }

  <script>
    // ============================================
    // ANDROID AUTOFILL FIX — JavaScript частина
    // Динамічно додаємо autocomplete="off" до
    // всіх форм і прибираємо autofill на Android
    // ============================================
    (function() {
      // Додаємо autocomplete=off до всіх форм і інпутів після рендеру
      const disableAutofill = () => {
        // Для всіх існуючих форм
        document.querySelectorAll('form').forEach(form => {
          if (!form.getAttribute('autocomplete')) {
            form.setAttribute('autocomplete', 'off');
          }
        });
        // Для всіх інпутів (крім тих що мають явний inputmode, кнопки, checkbox, radio)
        document.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="submit"]):not([type="button"])').forEach(input => {
          if (!input.getAttribute('autocomplete')) {
            input.setAttribute('autocomplete', 'off');
          }
          // Прибираємо suggestion bar на Android Chrome
          if (!input.getAttribute('autocorrect')) input.setAttribute('autocorrect', 'off');
          if (!input.getAttribute('autocapitalize')) input.setAttribute('autocapitalize', 'none');
          if (!input.getAttribute('spellcheck')) input.setAttribute('spellcheck', 'false');
        });
      };

      // Спостерігаємо за новими елементами в DOM
      const observer = new MutationObserver((mutations) => {
        mutations.forEach(mutation => {
          mutation.addedNodes.forEach(node => {
            if (node.nodeType === 1) {
              if (node.tagName === 'FORM') {
                node.setAttribute('autocomplete', 'off');
              }
              if (node.tagName === 'INPUT' && !['checkbox','radio','range','submit','button'].includes(node.type || '')) {
                if (!node.getAttribute('autocomplete')) node.setAttribute('autocomplete', 'off');
                if (!node.getAttribute('autocorrect')) node.setAttribute('autocorrect', 'off');
                if (!node.getAttribute('autocapitalize')) node.setAttribute('autocapitalize', 'none');
              }
              node.querySelectorAll && node.querySelectorAll('form').forEach(f => {
                f.setAttribute('autocomplete', 'off');
              });
              node.querySelectorAll && node.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]):not([type="range"])').forEach(inp => {
                if (!inp.getAttribute('autocomplete')) inp.setAttribute('autocomplete', 'off');
                if (!inp.getAttribute('autocorrect')) inp.setAttribute('autocorrect', 'off');
                if (!inp.getAttribute('autocapitalize')) inp.setAttribute('autocapitalize', 'none');
              });
            }
          });
        });
      });

      document.addEventListener('DOMContentLoaded', () => {
        disableAutofill();
        observer.observe(document.body, { childList: true, subtree: true });
      });

      // Також запускаємо через невеликий delay (для React-рендерених форм)
      setTimeout(disableAutofill, 500);
      setTimeout(disableAutofill, 2000);
      
      // Додаємо inputmode="text" щоб приховати Android autofill suggestion strip
      const addInputMode = () => {
        document.querySelectorAll('input:not([type="number"]):not([type="email"]):not([type="url"]):not([type="tel"]):not([type="date"]):not([type="color"])').forEach(input => {
          if (!input.getAttribute('inputmode')) input.setAttribute('inputmode', 'text');
          if (!input.getAttribute('x-ms-format-detection')) input.setAttribute('x-ms-format-detection', 'none');
        });
      };
      setTimeout(addInputMode, 600);
      setTimeout(addInputMode, 2500);
    })();

    // EXE Build Helpers
    window.addEventListener('click', (e) => {
      const isExe = /12TR-Engine/i.test(navigator.userAgent);
      if (!isExe) return;

      const anchor = e.target.closest('a') || (e.target.tagName === 'BUTTON' ? e.target : null);
      if (!anchor) return;

      const isLoginLink = anchor.innerText?.toLowerCase().includes('google') ||
        anchor.innerText?.toLowerCase().includes('вхід') ||
        anchor.getAttribute('href')?.includes('auth');

      if (isLoginLink && (window.process || isExe)) {
        // Nativefier handles window.open for external domains by opening them in default browser
        // if they don't match internal-urls
        if (anchor.getAttribute('href')) {
          window.open(anchor.getAttribute('href'), '_blank');
          e.preventDefault();
        }
      }
    }, true);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      // Aggressively unregister SW in development to avoid caching issues
      const isLocal = location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.hostname.startsWith('192.168.');

      if (isLocal) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('SW unregistered for development');
            });
          }
        });
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    }
  </script>
